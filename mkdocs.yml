site_name: Oliver Chalkley — Quantitative Strategies
site_description: Systematic, statistically-validated equity strategies built on complexity science and machine learning.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
  palette:
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - About: about.md
  - Approach: approach.md
  - Results: results.md
  - Reading List: references.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oliver-Chalkley
